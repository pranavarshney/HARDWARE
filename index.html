<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Tycoon</title>
    <!-- Importing Google Fonts for Typography & Hierarchy -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>

<body>

    <!-- OVERLAYS: Toasts & Modals -->
    <div id="toast-container"></div>

    <div id="confirm-overlay" class="hidden">
        <div class="confirm-dialog">
            <h3 id="confirm-title">SYSTEM PROMPT</h3>
            <p id="confirm-msg">Are you sure you want to proceed?</p>
            <div class="confirm-actions">
                <button id="btn-confirm-cancel" class="btn-cancel">CANCEL</button>
                <button id="btn-confirm-ok" class="btn-action">PROCEED</button>
            </div>
        </div>
    </div>

    <!-- TOP NAVIGATION -->
    <div class="top-nav">
        <div class="brand">
            <span class="logo-icon">💠</span>
            <span class="logo-text">HARDWARE TYCOON</span>
        </div>

        <div class="nav-modes" style="display:flex; align-items:center;">
            <div class="time-controls" style="display:flex; align-items:center; gap:10px; margin-right:15px; background:rgba(0,0,0,0.4); padding:4px 10px; border-radius:8px; border:1px solid var(--border-light); height:32px;">
                <button onclick="window.sys.prevQuarter()" title="Undo / Previous Quarter" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1rem; padding:0 5px; transition:color 0.2s;">◄</button>
                <div id="game-time-display" style="font-family:var(--font-mono); font-size:0.9rem; font-weight:bold; color:var(--accent); min-width:70px; text-align:center;">2010 Q1</div>
                <button onclick="window.sys.nextQuarter()" title="Next Quarter" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1rem; padding:0 5px; transition:color 0.2s;">►</button>
            </div>
            <button id="btn-current" class="nav-main active">CURRENT PRODUCTS</button>
            <button id="btn-all" class="nav-main">ALL PRODUCTS</button>
            <button class="nav-main" onclick="window.sys.startNewSave()" style="color:#ff4444; border-color:rgba(255,68,68,0.3);">START NEW SAVE</button>
        </div>
    </div>

    <!-- MAIN APP LAYOUT (Sidebar + Content) -->
    <div class="app-container">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="nav-group">
                <span class="label">PARTS</span>
                <button class="nav-item" data-type="cpu">CPU</button>
                <button class="nav-item" data-type="gpu">GPU</button>
                <button class="nav-item" data-type="ram">RAM</button>
                <button class="nav-item" data-type="storage">STORAGE</button>
                <button class="nav-item" data-type="mobo">MOBO</button>
                <button class="nav-item" data-type="camera">CAMERA</button>
                <button class="nav-item" data-type="display">DISPLAY</button>
            </div>

            <div class="divider"></div>

            <div class="nav-group">
                <span class="label">PRODUCTS</span>
                <button class="nav-item" data-type="desktop">Desktop</button>
                <button class="nav-item" data-type="console">Console</button>
                <button class="nav-item" data-type="laptop">Laptop</button>
                <button class="nav-item" data-type="smartphone">Smartphone</button>
                <button class="nav-item" data-type="server">Server</button>
            </div>
        </div>

        <!-- CONTENT AREA -->
        <div class="main-content">

            <!-- BREADCRUMB -->
            <div class="breadcrumb-bar">
                <div id="breadcrumb" class="breadcrumb">
                    <span>MARKETPLACE</span> <span class="separator">/</span> <span class="highlight">CURRENT
                        LINEUP</span>
                </div>
            </div>

            <!-- WORKSPACE -->
            <div id="workspace-wrapper">
                <div class="workspace-bg-grid"></div> <!-- Subtle grid overlay -->
                <div id="workspace" class="fade-in">
                    <!-- Dynamic Content Renders Here -->
                </div>
            </div>

        </div>
    </div>

    <!-- MODULE SCRIPTS -->
    <script src="save.js"></script>
    <script src="cpu.js"></script>
    <script src="gpu.js"></script>
    <script src="ram.js"></script>
    <script src="storage.js"></script>
    <script src="mobo.js"></script>
    <script src="camera.js"></script>
    <script src="display.js"></script>
    <script src="desktop.js"></script>
    <script src="console.js"></script>
    <script src="smartphone.js"></script>
    <script src="laptop.js"></script>
    <script src="server.js"></script>

    <script>
        // --- GLOBAL STATE ---
        window.currentPart = null;       // e.g., 'cpu', 'gpu'
        window.currentCategory = null;   // e.g., 'PARTS', 'PRODUCTS'
        window.currentView = 'storefront'; // 'storefront', 'inventory', or 'architect'

        // --- GLOBAL UI FUNCTIONS ---
        // Toast Notification System
        window.showToast = function (message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span class="toast-icon">${type === 'success' ? '✓' : 'ℹ'}</span> ${message}`;

            container.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 10);

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // Custom Confirm Dialog
        window.showConfirm = function (message, onConfirm) {
            const overlay = document.getElementById('confirm-overlay');
            const msgEl = document.getElementById('confirm-msg');
            const btnOk = document.getElementById('btn-confirm-ok');
            const btnCancel = document.getElementById('btn-confirm-cancel');

            msgEl.textContent = message;
            overlay.classList.remove('hidden');

            const cleanup = () => {
                overlay.classList.add('hidden');
                btnOk.removeEventListener('click', handleOk);
                btnCancel.removeEventListener('click', handleCancel);
            };

            const handleOk = () => { cleanup(); onConfirm(); };
            const handleCancel = () => { cleanup(); };

            btnOk.addEventListener('click', handleOk);
            btnCancel.addEventListener('click', handleCancel);
        };

        // --- A. NAVIGATION HANDLERS ---

        // 1. Sidebar Links (Architect View)
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', function () {
                const type = this.dataset.type;
                const category = this.closest('.nav-group').querySelector('.label').innerText;

                window.currentPart = type;
                window.currentCategory = category;
                window.currentView = 'architect';

                // Visuals: Un-highlight top buttons, highlight sidebar
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                updateTabButtons();
                updateBreadcrumb();
                transitionWorkspace();
            });
        });

        // 2. Top Nav Links (Global Views)
        const btnCurrent = document.getElementById('btn-current');
        const btnAll = document.getElementById('btn-all');

        btnCurrent.addEventListener('click', () => {
            window.currentView = 'storefront';
            window.currentPart = null; // Exit architect mode

            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));

            updateTabButtons();
            updateBreadcrumb();
            transitionWorkspace();
        });

        btnAll.addEventListener('click', () => {
            window.currentView = 'inventory';
            window.currentPart = null; // Exit architect mode

            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));

            updateTabButtons();
            updateBreadcrumb();
            transitionWorkspace();
        });

        function updateTabButtons() {
            btnCurrent.classList.toggle('active', window.currentView === 'storefront');
            btnAll.classList.toggle('active', window.currentView === 'inventory');
        }

        function updateBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            if (window.currentView === 'storefront') {
                bc.innerHTML = `<span>MARKETPLACE</span> <span class="separator">/</span> <span class="highlight">CURRENT LINEUP</span>`;
            } else if (window.currentView === 'inventory') {
                bc.innerHTML = `<span>DATABASE</span> <span class="separator">/</span> <span class="highlight">ALL PRODUCTS</span>`;
            } else if (window.currentView === 'architect') {
                bc.innerHTML = `<span>${window.currentCategory} R&D</span> <span class="separator">/</span> <span class="highlight">${window.currentPart.toUpperCase()}</span>`;
            }
        }

        // --- B. DYNAMIC RENDER ENGINE (With Animation) ---
        function transitionWorkspace() {
            const workspace = document.getElementById('workspace');

            // Fade out
            workspace.classList.remove('visible');

            setTimeout(() => {
                renderWorkspace();
                // Fade in
                workspace.classList.add('visible');
            }, 150); // Matches CSS transition time
        }

        function renderWorkspace() {
            const workspace = document.getElementById('workspace');
            workspace.innerHTML = ""; // Clear previous content

            // MODE 1: STOREFRONT (MARKETPLACE)
            if (window.currentView === 'storefront') {
                if (window.renderStorefront) {
                    window.renderStorefront();
                } else {
                    workspace.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon pulse">🛒</div>
                            <h2 class="empty-title">STOREFRONT OFFLINE</h2>
                            <p class="empty-desc">Storefront UI module is not yet implemented in save.js.</p>
                        </div>`;
                }
                return;
            }

            // MODE 2: INVENTORY (DATABASE)
            if (window.currentView === 'inventory') {
                if (window.renderInventory) {
                    window.renderInventory();
                } else {
                    workspace.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📁</div>
                            <h2 class="empty-title">DATABASE OFFLINE</h2>
                            <p class="empty-desc">Save system (save.js) module not detected.</p>
                        </div>`;
                }
                return;
            }

            // MODE 3: ARCHITECT (DESIGN LAB)
            if (window.currentView === 'architect') {
                // FIX: 'console' is a reserved browser word.
                let moduleName = window.currentPart;
                if (moduleName === 'console') moduleName = 'consoleArch';

                const module = window[moduleName];

                if (module && typeof module.render === 'function') {
                    // Render the Architect
                    module.render(workspace);
                    
                    // Auto-load the last crafted component of this type
                    if (typeof module.loadBase === 'function' && window.sys) {
                        const db = window.sys.load();
                        const matchingItems = db.inventory.filter(i => i.type.toLowerCase() === window.currentPart.toLowerCase());
                        if (matchingItems.length > 0) {
                            // Sort descending by id to get the latest
                            matchingItems.sort((a, b) => b.id - a.id);
                            const latestItem = matchingItems[0];
                            module.loadBase(latestItem.raw || latestItem);
                            if (window.showToast) window.showToast(`Auto-loaded specs from ${latestItem.name}`, 'info');
                        }
                    }

                } else {
                    // Stylized Empty State / Missing script
                    workspace.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon pulse">⚠️</div>
                            <h2 class="empty-title">${window.currentPart.toUpperCase()} DIVISION INACTIVE</h2>
                            <p class="empty-desc">This R&D department has not been established yet.</p>
                            <small>Deploy <code>${window.currentPart}.js</code> to commence operations.</small>
                        </div>
                    `;
                }
            }
        }

        // --- C. SYSTEM API ---

        window.cloneToArchitect = function (id) {
            if (!window.sys) return;
            const db = window.sys.load();
            const item = db.inventory.find(i => i.id === id);
            if (!item) return;

            // Prepare architect mode
            window.currentView = 'architect';
            window.currentPart = item.type.toLowerCase();

            // Map type to category
            const partTypes = ['cpu', 'gpu', 'ram', 'storage', 'mobo', 'camera', 'display'];
            window.currentCategory = partTypes.includes(window.currentPart) ? 'PARTS' : 'PRODUCTS';

            // Highlight side nav
            document.querySelectorAll('.nav-item').forEach(b => {
                b.classList.remove('active');
                if (b.dataset.type === window.currentPart) b.classList.add('active');
            });
            updateTabButtons();
            updateBreadcrumb();

            // Render workspace, then load base data
            transitionWorkspace();

            setTimeout(() => {
                let moduleName = window.currentPart;
                if (moduleName === 'console') moduleName = 'consoleArch';
                const module = window[moduleName];

                if (module && typeof module.loadBase === 'function') {
                    module.loadBase(item.raw || item); // Prefer raw original data
                    if (window.showToast) window.showToast(`Loaded ${item.name} for iterative R&D.`, 'info');
                } else {
                    if (window.showToast) window.showToast(`Module ${moduleName} does not support Cloning yet.`, 'error');
                }
            }, 180); // Wait for transition fade
        };

        // Trigger initial load directly into Storefront
        window.addEventListener('DOMContentLoaded', () => {
            if (window.sys && window.sys.updateTimeDisplay) window.sys.updateTimeDisplay();
            transitionWorkspace();
        });
    </script>
</body>

</html>
